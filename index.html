<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Range Builder</title>
  <meta name="description" content="Mémorise tes ranges préflop par position (BTN · CO · HJ · UTG · SB · BB) avec quiz intégré, notes et export PNG.">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

  <!-- Open Graph -->
  <meta property="og:type"         content="website">
  <meta property="og:url"          content="https://jassotv.github.io/poker-range-builder/">
  <meta property="og:title"        content="Poker Range Builder — Construis tes ranges préflop">
  <meta property="og:description"  content="Mémorise tes ranges préflop par position (BTN · CO · HJ · UTG · SB · BB) avec quiz intégré, notes et export PNG. Version PRO à 2,99€ accès à vie.">
  <meta property="og:image"        content="https://jassotv.github.io/poker-range-builder/assets/og-image.png">
  <meta property="og:image:width"  content="640">
  <meta property="og:image:height" content="320">
  <meta property="og:locale"       content="fr_FR">

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Poker Range Builder PRO — 2,99€ accès à vie">
  <meta name="twitter:description" content="Construis et mémorise tes ranges préflop par position. Quiz intégré, export PNG, 6 positions.">
  <meta name="twitter:image"       content="https://jassotv.github.io/poker-range-builder/assets/og-image.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-brand">
    <h1>Poker Range Builder</h1>
    <p id="headerSubtitle">Construis et mémorise tes ranges préflop par position</p>
  </div>
  <div class="header-actions">
    <a href="premium.html" class="pro-link">Pro ✦</a>
    <button class="btn-hamburger" id="btnHamburger" title="Menu">☰</button>
    <span class="save-status" id="saveStatus">Chargement…</span>
  </div>
</header>

<main>

  <section class="row">
    <span class="row-label" id="labelPos">Position</span>
    <div id="posTabs" class="tabs-group"></div>
    <div class="antes-wrap">
      <input type="checkbox" id="antesChk">
      <label for="antesChk" id="labelAntes">Antes en jeu</label>
    </div>
  </section>

  <section class="row">
    <span class="row-label" id="labelSit">Situation</span>
    <div id="sitTabs" class="tabs-group"></div>
  </section>

  <!-- Context box: visible on small/medium screens, hidden on large (pos-panel takes over) -->
  <div class="ctx-box" id="ctxBox"></div>

  <!-- Grid area: pos-panel appears on large screens -->
  <div class="grid-area">
    <div class="pos-panel" id="posPanel"></div>
    <div class="grid-col">
      <div class="top-bar">
        <div class="legend" id="legend"></div>
        <div class="stat" id="stat"></div>
      </div>
      <div class="grid-wrap">
        <div class="grid" id="grid"></div>
      </div>
      <div class="toolbar">
        <button class="btn" id="btnClear">Effacer</button>
        <button class="btn btn-primary" id="btnPng">Export PNG</button>
        <input type="file" id="fileInput" accept=".json" style="display:none">
      </div>
    </div>
  </div>

  <div class="pos-notes-section">
    <h2 id="posNotesTitle">Notes — BTN</h2>
    <textarea id="posNoteTextarea" class="pos-note-ta" placeholder="Notes générales sur BTN…"></textarea>
  </div>

  <div class="notes-section">
    <h2 id="notesTitle">Notes par situation</h2>
    <div class="notes-grid" id="notesGrid"></div>
  </div>

</main>

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-inner" id="sidebarInner"></div>
</aside>

<script src="presets.js"></script>
<script src="app.js"></script>
<script>
  // Pro badge in header — update after app.js has run
  (function () {
    const link = document.querySelector('a.pro-link[href="premium.html"]');
    if (!link) return;
    if (localStorage.getItem('pro_unlocked') === 'true') {
      link.textContent       = 'Pro actif ✓';
      link.style.color       = '#7ecc7e';
      link.style.borderColor = '#7ecc7e';
      link.removeAttribute('href');
      link.style.cursor      = 'default';
    }
  })();
</script>
</body>
</html>
