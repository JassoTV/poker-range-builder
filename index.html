<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poker Range Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-brand">
    <h1>Poker Range Builder</h1>
    <p id="headerSubtitle">Construis et mémorise tes ranges préflop par position</p>
  </div>
  <div class="header-actions">
    <a href="premium.html" class="pro-link">Pro ✦</a>
    <button class="btn-help" id="btnHelp" title="Help / Raccourcis">?</button>
    <span class="save-status" id="saveStatus">Chargement…</span>
  </div>
</header>

<main>

  <section class="row">
    <span class="row-label" id="labelPos">Position</span>
    <div id="posTabs" class="tabs-group"></div>
    <div class="antes-wrap">
      <input type="checkbox" id="antesChk">
      <label for="antesChk" id="labelAntes">Antes en jeu</label>
    </div>
  </section>

  <section class="row">
    <span class="row-label" id="labelSit">Situation</span>
    <div id="sitTabs" class="tabs-group"></div>
  </section>

  <div class="ctx-box" id="ctxBox"></div>

  <div class="top-bar">
    <div class="legend" id="legend"></div>
    <div class="stat" id="stat"></div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="toolbar">
    <button class="btn" id="btnClear">Effacer</button>
    <button class="btn btn-primary" id="btnPng">Export PNG</button>
    <!-- dev-only: revealed by ?dev=true -->
    <button class="btn btn-dev" id="btnImportJson" style="display:none">Import JSON</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
  </div>

  <div class="notes-section">
    <h2 id="notesTitle">Notes par situation</h2>
    <div class="notes-grid" id="notesGrid"></div>
  </div>

</main>

<!-- Sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-inner" id="sidebarInner"></div>
</aside>

<script src="app.js"></script>
<script>
  // Dev access — index.html?dev=true reveals Pro tools for local testing
  if (new URLSearchParams(location.search).get('dev') === 'true') {
    document.getElementById('btnImportJson').style.display = '';
    document.getElementById('btnImportJson').addEventListener('click', () =>
      document.getElementById('fileInput').click()
    );
    document.getElementById('fileInput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          // Clear then repopulate in-memory state from the imported object
          // Format: {"BTN_open": {"AA": 1, ...}, ...}
          Object.keys(rangeState).forEach(k => delete rangeState[k]);
          Object.assign(rangeState, data);
          // Persist and refresh
          localStorage.setItem('prb_state', JSON.stringify(rangeState));
          buildSitTabs();
          buildNotesGrid();
          renderAll();
        } catch (_) {}
        e.target.value = '';
      };
      reader.readAsText(file);
    });
  }
</script>
</body>
</html>
